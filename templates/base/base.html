{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Horizons{% endblock %}
    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Fonts -->

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Master CSS -->

    <link
        rel="stylesheet"
        href="{% static 'css/master.css' %}"
    >

    <!-- Page CSS -->

    {% block css %}{% endblock %}

</head>

<body>

    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Master JS -->

    <script
        src="{% static 'js/master.js' %}">
    </script>

    <!-- Page JS -->

    {% block js %}{% endblock %}

</body>

</html>
